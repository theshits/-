<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空气污染扩散模拟平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --warning: #FF9500;
            --error: #FF3B30;
            --bg: #F5F5F7;
            --card: #FFFFFF;
            --text: #1D1D1F;
            --text-secondary: #86868B;
            --border: #D2D2D7;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }
        .layout {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 240px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }
        .logo {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon { font-size: 28px; }
        .logo-text { font-size: 16px; font-weight: 600; }
        .nav { flex: 1; padding: 12px 0; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-item:hover { background: var(--bg); }
        .nav-item.active { 
            background: rgba(0, 122, 255, 0.1); 
            color: var(--primary);
            border-right: 3px solid var(--primary);
        }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header {
            background: var(--card);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .map-container { 
            flex: 1; 
            position: relative;
        }
        #map { width: 100%; height: 100%; }
        .sidebar-panel {
            position: absolute;
            right: 16px;
            top: 80px;
            width: 320px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 16px;
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #0066DD; }
        .btn-secondary { background: var(--bg); color: var(--text); }
        .btn-secondary:hover { background: #E8E8ED; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-danger { background: var(--error); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .form-group { margin-bottom: 12px; }
        .form-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .form-input, .select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }
        .form-input:focus, .select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item { text-align: center; padding: 12px; background: var(--bg); border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: 600; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .wind-rose { width: 100%; height: 160px; position: relative; }
        .wind-rose canvas { width: 100%; height: 100%; }
        .wind-controls { display: flex; gap: 12px; margin-top: 12px; }
        .wind-controls .form-group { flex: 1; margin: 0; }
        .contribution-list { max-height: 180px; overflow-y: auto; }
        .contribution-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .contribution-bar {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            flex: 1;
            margin: 0 12px;
        }
        .contribution-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
        }
        .legend {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 12px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .empty { text-align: center; color: var(--text-secondary); padding: 20px; font-size: 13px; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-primary { background: rgba(0, 122, 255, 0.1); color: var(--primary); }
        .badge-success { background: rgba(52, 199, 89, 0.1); color: var(--success); }
        .badge-warning { background: rgba(255, 149, 0, 0.1); color: var(--warning); }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .legend-scale {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
        }
        .legend-scale-item {
            flex: 1;
            height: 12px;
            font-size: 10px;
            text-align: center;
        }
        .legend-gradient {
            display: flex;
            height: 16px;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .slider-container {
            margin-bottom: 12px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .slider-label span:first-child {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .slider-label span:last-child {
            font-size: 12px;
            color: var(--primary);
            font-weight: 500;
        }
        .apple-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(to right, var(--primary), var(--primary));
            background-size: 50% 100%;
            background-repeat: no-repeat;
            background-color: #e5e5e5;
            outline: none;
            cursor: pointer;
        }
        .apple-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.04);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .apple-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 3px 8px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.04);
        }
        .apple-slider::-webkit-slider-thumb:active {
            transform: scale(0.95);
        }
        .apple-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.04);
            cursor: pointer;
            border: none;
            transition: transform 0.15s ease;
        }
        .apple-slider::-moz-range-thumb:hover {
            transform: scale(1.1);
        }
        .leaflet-container { background: #E8E8ED; }
        .leaflet-popup-content-wrapper { border-radius: 12px; }
        .leaflet-popup-content { margin: 12px 16px; }
        .popup-title { font-weight: 600; margin-bottom: 8px; }
        .popup-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
        .popup-label { color: var(--text-secondary); }
        .pollutant-tag {
            display: inline-block;
            padding: 2px 6px;
            background: var(--bg);
            border-radius: 4px;
            font-size: 11px;
            margin: 2px;
        }
        .leaflet-div-icon {
            background: #007AFF !important;
            border: 2px solid white !important;
            border-radius: 50% !important;
            width: 12px !important;
            height: 12px !important;
            margin-left: -6px !important;
            margin-top: -6px !important;
            cursor: pointer !important;
            pointer-events: all !important;
        }
        .leaflet-div-icon:hover {
            background: #0055CC !important;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🌬️</span>
                <span class="logo-text">污染扩散模拟</span>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item active">📍 主界面</a>
                <a href="/sources" class="nav-item">🏭 排放源管理</a>
                <a href="/receptors" class="nav-item">📊 受体点管理</a>
                <a href="/meteorology" class="nav-item">🌤️ 气象场管理</a>
            </nav>
            <div style="padding: 12px; border-top: 1px solid var(--border);">
                <div class="slider-container">
                    <div class="slider-label">
                        <span>模拟范围</span>
                        <span id="domainSizeValue">5 km</span>
                    </div>
                    <input type="range" id="domainSizeSlider" class="apple-slider" min="5" max="100" value="5" step="5" oninput="updateSliderValue('domainSize')">
                </div>
                <div class="slider-container">
                    <div class="slider-label">
                        <span>网格分辨率</span>
                        <span id="gridResolutionValue">100 m</span>
                    </div>
                    <input type="range" id="gridResolutionSlider" class="apple-slider" min="50" max="500" value="100" step="25" oninput="updateSliderValue('gridResolution')">
                </div>
            </div>
        </aside>
        <main class="main">
            <header class="header">
                <div>
                    <h1>空气污染扩散模拟平台</h1>
                </div>
                <div class="header-controls">
                    <select id="mapLayerSelect" class="select" style="width: 120px;" onchange="switchMapLayer()">
                        <option value="osm">高德街道</option>
                        <option value="satellite">高德卫星</option>
                        <option value="hybrid">卫星+标注</option>
                    </select>
                    <select id="metSelect" class="select" style="width: 200px;">
                        <option value="">选择气象场...</option>
                    </select>
                    <select id="pollutantSelect" class="select" style="width: 120px;">
                        <option value="">全部污染物</option>
                        <option value="PM2.5">PM2.5</option>
                        <option value="PM10">PM10</option>
                        <option value="VOCs">VOCs</option>
                        <option value="SO2">SO2</option>
                        <option value="NOx">NOx</option>
                        <option value="CO">CO</option>
                    </select>
                    <button class="btn btn-primary" onclick="runSimulation()">▶ 运行模拟</button>
                    <button class="btn btn-secondary" onclick="clearResults()">🗑️ 清除结果</button>
                </div>
            </header>
            <div class="map-container">
                <div id="map"></div>
                <div class="sidebar-panel">
                    <div class="card">
                        <div class="card-title">气象控制</div>
                        <div class="wind-rose">
                            <canvas id="windCanvas"></canvas>
                        </div>
                        <div class="wind-controls">
                            <div class="form-group">
                                <label class="form-label">风向 (°)</label>
                                <input type="number" id="windDir" class="form-input" value="0" min="0" max="360">
                            </div>
                            <div class="form-group">
                                <label class="form-label">风速 (m/s)</label>
                                <input type="number" id="windSpeed" class="form-input" value="2" min="0.1" max="20" step="0.1">
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">数据统计</div>
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-value" id="sourceCount">0</div>
                                <div class="stat-label">排放源</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="receptorCount">0</div>
                                <div class="stat-label">受体点</div>
                            </div>
                        </div>
                        <div class="legend">
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #FF5722;"></div>
                                <span>排放源</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #2196F3;"></div>
                                <span>受体点</span>
                            </div>
                        </div>
                    </div>
                    <div class="card" id="resultCard" style="display: none;">
                        <div class="card-title">
                            <span>模拟结果</span>
                            <span class="badge badge-success">完成</span>
                        </div>
                        <div class="form-group" style="margin-bottom: 12px;">
                            <label class="form-label">显示污染物</label>
                            <select id="displayPollutantSelect" class="select" style="width: 100%;" onchange="switchDisplayPollutant()">
                                <option value="">全部污染物</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 12px;">
                            <label class="form-label">色阶类型</label>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <select id="colorScaleSelect" class="select" style="flex: 1;" onchange="updateColorScale()">
                                    <option value="blue">蓝色渐变</option>
                                    <option value="red">红黄渐变</option>
                                    <option value="green">绿色渐变</option>
                                    <option value="purple">紫色渐变</option>
                                    <option value="thermal">热力图</option>
                                    <option value="rainbow">彩虹</option>
                                    <option value="turbo">Turbo</option>
                                    <option value="spectral_r">Spectral_r</option>
                                    <option value="jet" selected>Jet</option>
                                </select>
                                <button class="btn btn-sm btn-secondary" onclick="openColorSettings()" title="色阶设置">⚙️</button>
                            </div>
                        </div>
                        <div id="colorSettingsPanel" style="display: none; margin-bottom: 12px; padding: 10px; background: var(--bg); border-radius: 8px;">
                            <div style="font-size: 12px; font-weight: 600; margin-bottom: 8px;">浓度范围设置 (µg/m³)</div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">最小值</label>
                                    <input type="number" id="concMin" class="form-input" value="0" min="0" step="0.1" onchange="applyColorSettings()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">最大值</label>
                                    <input type="number" id="concMax" class="form-input" value="100" min="0.1" step="0.1" onchange="applyColorSettings()">
                                </div>
                            </div>
                            <div style="display: flex; gap: 8px; margin-top: 8px;">
                                <button class="btn btn-sm btn-secondary" onclick="resetColorSettings()">重置</button>
                                <button class="btn btn-sm btn-primary" onclick="closeColorSettings()">确定</button>
                            </div>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">浓度分布图例</p>
                            <div class="legend-gradient" id="legendGradient">
                                <div style="flex:1; background: #E3F2FD;"></div>
                                <div style="flex:1; background: #90CAF9;"></div>
                                <div style="flex:1; background: #42A5F5;"></div>
                                <div style="flex:1; background: #1E88E5;"></div>
                                <div style="flex:1; background: #1565C0;"></div>
                                <div style="flex:1; background: #0D47A1;"></div>
                            </div>
                            <div class="legend-scale" id="legendScale">
                                <span class="legend-scale-item" id="legendMin">0</span>
                                <span class="legend-scale-item" style="flex: 3;"></span>
                                <span class="legend-scale-item" id="legendMax">100</span>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">贡献度排名</div>
                        <div id="contributions" class="contribution-list" style="max-height: 350px; overflow-y: auto;">
                            <div class="empty">请运行模拟查看结果</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, sourceMarkers = [], receptorMarkers = [], plumeLayer, shpLayer;
        let windDirection = 0, windSpeed = 2;
        let currentTileLayer = null;
        let shpGeojson = null;
        let overlayLayer = null;
        let lastSimulationResult = null;
        let customConcRange = null;
        
        const MARKER_SYMBOLS = {
            factory: '🏭',
            industry: '⚙️',
            power: '⚡',
            chemical: '🧪',
            circle: '●',
            square: '■',
            triangle: '▲',
            diamond: '◆',
            star: '★',
            hexagon: '⬡',
            pentagon: '⬠',
            cross: '✚',
        };
        
        const COLOR_SCALES = {
            blue: {
                colors: ['#E3F2FD', '#90CAF9', '#42A5F5', '#1E88E5', '#1565C0', '#0D47A1'],
                name: '蓝色渐变'
            },
            red: {
                colors: ['#FFF3E0', '#FFCC80', '#FF9800', '#F57C00', '#E65100', '#BF360C'],
                name: '红黄渐变'
            },
            green: {
                colors: ['#E8F5E9', '#A5D6A7', '#66BB6A', '#43A047', '#2E7D32', '#1B5E20'],
                name: '绿色渐变'
            },
            purple: {
                colors: ['#F3E5F5', '#CE93D8', '#AB47BC', '#8E24AA', '#6A1B9A', '#4A148C'],
                name: '紫色渐变'
            },
            thermal: {
                colors: ['#000080', '#0000FF', '#00FFFF', '#00FF00', '#FFFF00', '#FF0000'],
                name: '热力图'
            },
            rainbow: {
                colors: ['#9400D3', '#4B0082', '#0000FF', '#00FF00', '#FFFF00', '#FF7F00'],
                name: '彩虹'
            },
            turbo: {
                colors: ['#30123B', '#4662D7', '#35AAF8', '#1AE4B6', '#72FE5E', '#C8EF34', '#FABA39', '#F66B19', '#CA2A04', '#7A0403'],
                name: 'Turbo'
            },
            spectral_r: {
                colors: ['#9E0142', '#D53E4F', '#F46D43', '#FDAE61', '#FEE08B', '#FFFFBF', '#E6F598', '#ABDDA4', '#66C2A5', '#3288BD', '#5E4FA2'],
                name: 'Spectral_r'
            },
            jet: {
                colors: ['#0000FF', '#00FFFF', '#00FF00', '#FFFF00', '#FF7F00', '#FF0000'],
                name: 'Jet'
            }
        };
        
        const TILE_LAYERS = {
            osm: {
                url: 'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
                options: { maxZoom: 18, subdomains: ['1', '2', '3', '4'] }
            },
            satellite: {
                url: 'https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',
                options: { maxZoom: 18, subdomains: ['1', '2', '3', '4'] }
            },
            hybrid: {
                url: 'https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',
                options: { maxZoom: 18, subdomains: ['1', '2', '3', '4'] },
                overlay: 'https://webst0{s}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}'
            }
        };
        
        const PI = Math.PI;
        const A = 6378245.0;
        const EE = 0.00669342162296594323;
        
        function wgs84ToGcj02(lng, lat) {
            let dLat = transformLat(lng - 105.0, lat - 35.0);
            let dLng = transformLng(lng - 105.0, lat - 35.0);
            const radLat = lat / 180.0 * PI;
            let magic = Math.sin(radLat);
            magic = 1 - EE * magic * magic;
            const sqrtMagic = Math.sqrt(magic);
            dLat = (dLat * 180.0) / ((A * (1 - EE)) / (magic * sqrtMagic) * PI);
            dLng = (dLng * 180.0) / (A / sqrtMagic * Math.cos(radLat) * PI);
            return [lng + dLng, lat + dLat];
        }
        
        function transformLat(x, y) {
            let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
            ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
            return ret;
        }
        
        function transformLng(x, y) {
            let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
            ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
            return ret;
        }

        async function init() {
            await initMap();
            await loadData();
            restoreState();
            initWindRose();
            initSliders();
        }
        
        function saveState() {
            if (!map) return;
            
            const existingState = localStorage.getItem('pollutionSimState');
            let existingHasSimulation = false;
            if (existingState) {
                try {
                    const parsed = JSON.parse(existingState);
                    existingHasSimulation = parsed.hasSimulation || false;
                } catch (e) {}
            }
            
            const hasSimulation = lastSimulationResult !== null || existingHasSimulation;
            
            const state = {
                mapCenter: { lat: map.getCenter().lat, lng: map.getCenter().lng },
                mapZoom: map.getZoom(),
                mapLayer: document.getElementById('mapLayerSelect').value,
                colorScale: document.getElementById('colorScaleSelect').value,
                customConcRange: customConcRange,
                metId: document.getElementById('metSelect').value,
                pollutantType: document.getElementById('pollutantSelect').value,
                domainSize: document.getElementById('domainSizeSlider').value,
                gridResolution: document.getElementById('gridResolutionSlider').value,
                hasSimulation: hasSimulation
            };
            
            if (lastSimulationResult) {
                try {
                    const simData = JSON.stringify(lastSimulationResult);
                    if (simData.length < 10 * 1024 * 1024) {
                        localStorage.setItem('pollutionSimResult', simData);
                    } else {
                        console.warn('Simulation result too large to save:', (simData.length / 1024 / 1024).toFixed(2), 'MB');
                        localStorage.removeItem('pollutionSimResult');
                    }
                } catch (e) {
                    console.warn('Failed to save simulation result:', e);
                }
            }
            
            localStorage.setItem('pollutionSimState', JSON.stringify(state));
        }
        
        function restoreState() {
            try {
                const saved = localStorage.getItem('pollutionSimState');
                if (!saved) return;
                
                const state = JSON.parse(saved);
                
                if (state.mapLayer) {
                    document.getElementById('mapLayerSelect').value = state.mapLayer;
                    switchMapLayer();
                }
                
                if (state.colorScale) {
                    document.getElementById('colorScaleSelect').value = state.colorScale;
                }
                
                if (state.customConcRange) {
                    customConcRange = state.customConcRange;
                    document.getElementById('concMin').value = customConcRange.min;
                    document.getElementById('concMax').value = customConcRange.max;
                }
                
                if (state.metId) {
                    document.getElementById('metSelect').value = state.metId;
                }
                
                if (state.pollutantType) {
                    document.getElementById('pollutantSelect').value = state.pollutantType;
                }
                
                if (state.domainSize) {
                    document.getElementById('domainSizeSlider').value = state.domainSize;
                    updateSliderValue('domainSize');
                }
                
                if (state.gridResolution) {
                    document.getElementById('gridResolutionSlider').value = state.gridResolution;
                    updateSliderValue('gridResolution');
                }
                
                if (state.hasSimulation) {
                    try {
                        const simResult = localStorage.getItem('pollutionSimResult');
                        if (simResult) {
                            lastSimulationResult = JSON.parse(simResult);
                            visualizePlume(lastSimulationResult);
                            updateLegendGradient(document.getElementById('colorScaleSelect').value);
                            updateContributions(lastSimulationResult.receptor_contributions);
                            document.getElementById('resultCard').style.display = 'block';
                        }
                    } catch (e) {
                        console.warn('Failed to restore simulation result:', e);
                    }
                }
            } catch (e) {
                console.error('Failed to restore state:', e);
            }
        }
        
        async function initMap() {
            map = L.map('map', {
                zoomControl: true,
                attributionControl: false
            });
            
            currentTileLayer = L.tileLayer(TILE_LAYERS.osm.url, TILE_LAYERS.osm.options).addTo(map);
            
            const savedState = localStorage.getItem('pollutionSimState');
            let hasSavedState = false;
            if (savedState) {
                try {
                    const state = JSON.parse(savedState);
                    if (state.mapCenter && state.mapZoom) {
                        map.setView([state.mapCenter.lat, state.mapCenter.lng], state.mapZoom);
                        hasSavedState = true;
                    }
                } catch (e) {}
            }
            
            if (!hasSavedState) {
                map.setView([35.0, 110.0], 5);
                
                try {
                    const boundsRes = await fetch('/api/map/bounds');
                    if (boundsRes.ok) {
                        const bounds = await boundsRes.json();
                        
                        if (bounds.min_lat && bounds.max_lat && bounds.min_lon && bounds.max_lon) {
                            map.fitBounds([
                                [bounds.min_lat, bounds.min_lon],
                                [bounds.max_lat, bounds.max_lon]
                            ]);
                        }
                    }
                } catch (e) {
                    console.error('Failed to load map bounds:', e);
                }
            }
            
            map.on('moveend', saveState);
            map.on('zoomend', saveState);
            
            try {
                const geojsonRes = await fetch('/api/map/geojson');
                if (geojsonRes.ok) {
                    const geojson = await geojsonRes.json();
                    
                    if (geojson.features && geojson.features.length > 0) {
                        shpGeojson = geojson;
                        shpLayer = L.geoJSON(geojson, {
                            style: {
                                color: '#666',
                                weight: 1,
                                fillColor: 'transparent',
                                fillOpacity: 0,
                                opacity: 0.7
                            },
                            onEachFeature: (feature, layer) => {
                                if (feature.properties) {
                                    const name = feature.properties.NAME || feature.properties.name || 
                                               feature.properties.名称 || '未命名区域';
                                    layer.bindPopup(`<div class="popup-title">${name}</div>`);
                                }
                            }
                        }).addTo(map);
                        console.log('SHP底图加载成功，共', geojson.features.length, '个要素');
                    }
                }
            } catch (e) {
                console.error('加载地图底图失败:', e);
            }
            
            if (!map.getCenter()) {
                map.setView([35.0, 110.0], 5);
            }
        }
        
        function switchMapLayer() {
            const layerType = document.getElementById('mapLayerSelect').value;
            
            if (currentTileLayer) {
                map.removeLayer(currentTileLayer);
                currentTileLayer = null;
            }
            
            if (overlayLayer) {
                map.removeLayer(overlayLayer);
                overlayLayer = null;
            }
            
            if (shpLayer) {
                map.removeLayer(shpLayer);
                shpLayer = null;
            }
            
            if (TILE_LAYERS[layerType]) {
                currentTileLayer = L.tileLayer(TILE_LAYERS[layerType].url, TILE_LAYERS[layerType].options).addTo(map);
                
                if (layerType === 'hybrid' && TILE_LAYERS[layerType].overlay) {
                    overlayLayer = L.tileLayer(TILE_LAYERS[layerType].overlay, { maxZoom: 18, subdomains: ['1', '2', '3', '4'] }).addTo(map);
                }
                
                if (shpGeojson && shpGeojson.features && shpGeojson.features.length > 0) {
                    shpLayer = L.geoJSON(shpGeojson, {
                        style: {
                            color: '#666',
                            weight: 1,
                            fillColor: 'transparent',
                            fillOpacity: 0,
                            opacity: 0.8
                        },
                        onEachFeature: (feature, layer) => {
                            if (feature.properties) {
                                const name = feature.properties.NAME || feature.properties.name || 
                                           feature.properties.名称 || '未命名区域';
                                layer.bindPopup(`<div class="popup-title">${name}</div>`);
                            }
                        }
                    }).addTo(map);
                }
            }
            
            sourceMarkers.forEach(m => m.addTo(map));
            receptorMarkers.forEach(m => m.addTo(map));
            if (plumeLayer) plumeLayer.addTo(map);
            saveState();
        }

            try {
                const [sourcesRes, receptorsRes, metRes] = await Promise.all([
                    fetch('/api/sources/').then(r => r.json()),
                    fetch('/api/receptors/').then(r => r.json()),

                    const corners = [
                        [s.latitude - latOffset, s.longitude - lonOffset],
                        [s.latitude - latOffset, s.longitude + lonOffset],

                } else {

        function updateMetSelect(meteorologies) {
            const select = document.getElementById('metSelect');
            select.innerHTML = '<option value="">选择气象场...</option>';
            meteorologies.forEach(m => {
                select.innerHTML += `<option value="${m.id}">${m.name} - 风速:${m.wind_speed}m/s</option>`;
            });
            if (meteorologies.length > 0) {
                select.value = meteorologies[0].id;
                windDirection = meteorologies[0].wind_direction;
                windSpeed = meteorologies[0].wind_speed;
                document.getElementById('windDir').value = windDirection;
                document.getElementById('windSpeed').value = windSpeed;
                drawWindRose();
            }
        }
        
        function initWindRose() {
            const canvas = document.getElementById('windCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
            
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width/2;
                const y = rect.height/2 - (e.clientY - rect.top);
                windDirection = Math.round(Math.atan2(x, y) * 180 / Math.PI + 360) % 360;
                windSpeed = Math.min(20, Math.max(0.5, Math.sqrt(x*x + y*y) / 4));
                document.getElementById('windDir').value = windDirection;
                document.getElementById('windSpeed').value = windSpeed.toFixed(1);
                drawWindRose();
                updateMeteorology();
            });
            
            document.getElementById('windDir').addEventListener('change', (e) => {
                windDirection = parseInt(e.target.value);
                drawWindRose();
                updateMeteorology();
            });
            
            document.getElementById('windSpeed').addEventListener('change', (e) => {
                windSpeed = parseFloat(e.target.value);
                drawWindRose();
                updateMeteorology();
            });
            
            drawWindRose();
        }
        
        function drawWindRose() {
            const canvas = document.getElementById('windCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.offsetWidth, h = canvas.offsetHeight;
            const cx = w/2, cy = h/2, r = Math.min(w, h)/2 - 10;
            
            ctx.clearRect(0, 0, w, h);
            
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const angle = i * Math.PI / 4;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + r * Math.sin(angle), cy - r * Math.cos(angle));
                ctx.stroke();
            }
            
            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                ctx.arc(cx, cy, r * i / 4, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            const labels = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            ctx.fillStyle = '#666';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            labels.forEach((label, i) => {
                const angle = i * Math.PI / 4;
                const x = cx + (r + 12) * Math.sin(angle);
                const y = cy - (r + 12) * Math.cos(angle) + 4;
                ctx.fillText(label, x, y);
            });
            
            const angle = (90 - windDirection) * Math.PI / 180;
            const len = windSpeed / 20 * r;
            ctx.strokeStyle = '#007AFF';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + len * Math.cos(angle), cy - len * Math.sin(angle));
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#007AFF';
            ctx.fill();
        }
        
        async function updateMeteorology() {
            const metId = document.getElementById('metSelect').value;
            if (!metId) return;
            
            try {
                await fetch(`/api/meteorology/${metId}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        wind_direction: windDirection,
                        wind_speed: windSpeed
                    })
                });
            } catch (e) {
                console.error('更新气象场失败:', e);
            }
        }
        
        async function runSimulation() {
            const metId = document.getElementById('metSelect').value;
            if (!metId) {
                alert('请先选择气象场');
                return;
            }
            
            localStorage.removeItem('pollutionSimResult');
            lastSimulationResult = null;
            
            const pollutantType = document.getElementById('pollutantSelect').value || null;
            
            try {
                document.getElementById('contributions').innerHTML = '<div class="loading"><div class="spinner"></div>正在模拟...</div>';
                
                const res = await fetch('/api/simulation/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        meteorology_id: parseInt(metId),
                        pollutant_type: pollutantType,
                        grid_resolution: parseInt(document.getElementById('gridResolutionSlider').value),
                        domain_size: parseInt(document.getElementById('domainSizeSlider').value) * 1000
                    })
                });
                
                if (!res.ok) {
                    let errMsg = '模拟请求失败';
                    try {
                        const errData = await res.json();
                        errMsg = errData.detail || errMsg;
                    } catch (e) {
                        errMsg = await res.text() || errMsg;
                    }
                    throw new Error(errMsg);
                }
                
                const result = await res.json();
                lastSimulationResult = result;
                
                const pollutantSelect = document.getElementById('displayPollutantSelect');
                pollutantSelect.innerHTML = '<option value="">全部污染物</option>';
                if (result.available_pollutants && result.available_pollutants.length > 0) {
                    result.available_pollutants.forEach(p => {
                        const option = document.createElement('option');
                        option.value = p;
                        option.textContent = p;
                        pollutantSelect.appendChild(option);
                    });
                }
                
                visualizePlume(result);
                updateContributions(result.receptor_contributions);
                document.getElementById('resultCard').style.display = 'block';
                saveState();
            } catch (e) {
                console.error('模拟失败:', e);
                alert('模拟失败: ' + e.message);
                document.getElementById('contributions').innerHTML = '<div class="empty">模拟失败: ' + e.message + '</div>';
            }
        }
        
        function visualizePlume(result) {
            lastSimulationResult = result;
            if (plumeLayer) map.removeLayer(plumeLayer);
            
            const {concentrations, grid_lat, grid_lon} = result;
            const dataMaxConc = Math.max(...concentrations.flat());
            
            if (dataMaxConc <= 0) {
                console.log('No valid concentration data to display');
                return;
            }
            
            let displayMinConc = 0;
            let displayMaxConc = dataMaxConc;
            
            if (customConcRange && customConcRange.max > customConcRange.min) {
                displayMinConc = customConcRange.min;
                displayMaxConc = customConcRange.max;
            }
            
            const minThreshold = displayMinConc > 0 ? displayMinConc * 0.01 : displayMaxConc * 0.00001;
            
            const scaleType = document.getElementById('colorScaleSelect').value;
            const colors = COLOR_SCALES[scaleType].colors;
            const numLevels = colors.length;
            
            const maxDisplayGrids = 150;
            const gridSize = grid_lat.length;
            const step = Math.max(1, Math.ceil(gridSize / maxDisplayGrids));
            
            const layers = [];
            let processedCount = 0;
            const maxLayers = 40000;
            
            for (let lat = 0; lat < grid_lat.length - 1 && processedCount < maxLayers; lat += step) {
                for (let lon = 0; lon < grid_lon.length - 1 && processedCount < maxLayers; lon += step) {
                    let sumConc = 0;
                    let count = 0;
                    
                    const latEnd = Math.min(lat + step, grid_lat.length - 1);
                    const lonEnd = Math.min(lon + step, grid_lon.length - 1);
                    
                    for (let dl = 0; dl < step && lat + dl < grid_lat.length - 1; dl++) {
                        for (let dn = 0; dn < step && lon + dn < grid_lon.length - 1; dn++) {
                            const c00 = concentrations[lat + dl][lon + dn];
                            const c10 = concentrations[lat + dl + 1][lon + dn];
                            const c01 = concentrations[lat + dl][lon + dn + 1];
                            const c11 = concentrations[lat + dl + 1][lon + dn + 1];
                            if (isFinite(c00) && isFinite(c10) && isFinite(c01) && isFinite(c11)) {
                                sumConc += (c00 + c10 + c01 + c11) / 4;
                                count++;
                            }
                        }
                    }
                    
                    if (count === 0) continue;
                    const avgConc = sumConc / count;
                    
                    if (avgConc <= minThreshold) continue;
                    
                    let normalizedValue;
                    if (displayMaxConc > displayMinConc) {
                        normalizedValue = (avgConc - displayMinConc) / (displayMaxConc - displayMinConc);
                    } else {
                        normalizedValue = avgConc / displayMaxConc;
                    }
                    normalizedValue = Math.max(0, Math.min(1, normalizedValue));
                    
                    if (normalizedValue < 0.00000001) continue;
                    
                    const colorIndex = Math.min(Math.floor(normalizedValue * numLevels), numLevels - 1);
                    
                    const polygon = L.polygon([
                        wgs84ToGcj02(grid_lon[lon], grid_lat[lat]),
                        wgs84ToGcj02(grid_lon[lon], grid_lat[latEnd]),
                        wgs84ToGcj02(grid_lon[lonEnd], grid_lat[latEnd]),
                        wgs84ToGcj02(grid_lon[lonEnd], grid_lat[lat])
                    ].map(c => [c[1], c[0]]), {
                        color: colors[colorIndex],
                        fillColor: colors[colorIndex],
                        fillOpacity: 0.5,
                        weight: 0,
                        stroke: false
                    });
                    layers.push(polygon);
                    processedCount++;
                }
            }
            
            if (layers.length === 0) {
                console.log('No layers to display, dataMax:', dataMaxConc, 'displayRange:', displayMinConc, '-', displayMaxConc);
            } else {
                console.log('Rendered', layers.length, 'polygons, step:', step, 'gridSize:', gridSize);
            }
            
            plumeLayer = L.layerGroup(layers);
            plumeLayer.addTo(map);
            updateLegendGradient(scaleType);
            updateLegendScale(displayMinConc, displayMaxConc);
        }
        
        function updateLegendScale(minVal, maxVal) {
            const formatValue = (val) => {
                if (val === 0) return '0';
                const absVal = Math.abs(val);
                if (absVal >= 1000 || absVal < 0.01) {
                    return val.toExponential(2);
                } else if (absVal >= 1) {
                    return val.toFixed(1);
                } else {
                    return val.toPrecision(2);
                }
            };
            document.getElementById('legendMin').textContent = formatValue(minVal);
            document.getElementById('legendMax').textContent = formatValue(maxVal);
        }
        
        function updateColorScale() {
            const scaleType = document.getElementById('colorScaleSelect').value;
            updateLegendGradient(scaleType);
            saveState();
            
            if (lastSimulationResult) {
                visualizePlume(lastSimulationResult);
            }
        }
        
        function switchDisplayPollutant() {
            if (!lastSimulationResult) return;
            
            const selectedPollutant = document.getElementById('displayPollutantSelect').value;
            
            if (selectedPollutant && lastSimulationResult.pollutant_concentrations && lastSimulationResult.pollutant_concentrations[selectedPollutant]) {
                const pollutantResult = {
                    ...lastSimulationResult,
                    concentrations: lastSimulationResult.pollutant_concentrations[selectedPollutant]
                };
                visualizePlume(pollutantResult);
            } else {
                visualizePlume(lastSimulationResult);
            }
        }
        
        function updateLegendGradient(scaleType) {
            const colors = COLOR_SCALES[scaleType].colors;
            const gradient = document.getElementById('legendGradient');
            gradient.innerHTML = colors.map(c => `<div style="flex:1; background: ${c};"></div>`).join('');
        }
        
        function openColorSettings() {
            document.getElementById('colorSettingsPanel').style.display = 'block';
        }
        
        function closeColorSettings() {
            document.getElementById('colorSettingsPanel').style.display = 'none';
        }
        
        function applyColorSettings() {
            const minVal = parseFloat(document.getElementById('concMin').value) || 0;
            const maxVal = parseFloat(document.getElementById('concMax').value) || 100;
            
            if (maxVal <= minVal) {
                alert('最大值必须大于最小值');
                return;
            }
            
            customConcRange = { min: minVal, max: maxVal };
            saveState();
            
            if (lastSimulationResult) {
                visualizePlume(lastSimulationResult);
            }
        }
        
        function resetColorSettings() {
            customConcRange = null;
            document.getElementById('concMin').value = 0;
            document.getElementById('concMax').value = 100;
            saveState();
            
            if (lastSimulationResult) {
                visualizePlume(lastSimulationResult);
            }
        }
        
        function updateContributions(receptorContributions) {
            const container = document.getElementById('contributions');
            
            const formatConc = (val) => {
                if (val === 0) return '0';
                const absVal = Math.abs(val);
                if (absVal >= 1000 || absVal < 0.01) {
                    return val.toExponential(2);
                } else if (absVal >= 1) {
                    return val.toFixed(1);
                } else {
                    return val.toPrecision(2);
                }
            };
            
            let html = '';
            
            if (receptorContributions && Object.keys(receptorContributions).length > 0) {
                html += '<div style="margin-bottom: 16px;">';
                html += '<div style="font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text);">📍 受体点贡献分析</div>';
                
                for (const [receptorName, pollutantData] of Object.entries(receptorContributions)) {
                    html += `<div style="margin-bottom: 12px; padding: 10px; background: var(--bg); border-radius: 8px;">`;
                    html += `<div style="font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 6px;">${receptorName}</div>`;
                    
                    if (pollutantData && Object.keys(pollutantData).length > 0) {
                        for (const [pollutant, sources] of Object.entries(pollutantData)) {
                            html += `<div style="margin-top: 6px; padding-top: 4px; border-top: 1px dashed var(--border);">`;
                            html += `<div style="font-size: 10px; color: var(--text-secondary); margin-bottom: 3px;">${pollutant}</div>`;
                            
                            if (sources && sources.length > 0) {
                                const maxConc = Math.max(...sources.map(s => s.concentration || 0));
                                sources.slice(0, 5).forEach(s => {
                                    const pct = s.percentage || 0;
                                    const barWidth = maxConc > 0 ? (s.concentration / maxConc * 100) : 0;
                                    html += `
                                        <div class="contribution-item" style="padding: 2px 0;">
                                            <span style="width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;">${s.source_name}</span>
                                            <div class="contribution-bar" style="flex:1; margin: 0 6px;">
                                                <div class="contribution-fill" style="width:${barWidth}%"></div>
                                            </div>
                                            <span style="width:70px;text-align:right;font-size:10px;">${pct.toFixed(1)}% | ${formatConc(s.concentration || 0)}</span>
                                        </div>
                                    `;
                                });
                            }
                            html += '</div>';
                        }
                    } else {
                        html += '<div style="font-size: 11px; color: var(--text-secondary);">无数据</div>';
                    }
                    html += '</div>';
                }
                html += '</div>';
            }
            
            if (!html) {
                container.innerHTML = '<div class="empty">暂无贡献度数据</div>';
            } else {
                container.innerHTML = html;
            }
        }
        
        function clearResults() {
            if (plumeLayer) map.removeLayer(plumeLayer);
            plumeLayer = null;
            lastSimulationResult = null;
            localStorage.removeItem('pollutionSimResult');
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('contributions').innerHTML = '<div class="empty">请运行模拟查看结果</div>';
            saveState();
        }
        
        function updateSliderValue(type) {
            if (type === 'domainSize') {
                const slider = document.getElementById('domainSizeSlider');
                const value = slider.value;
                document.getElementById('domainSizeValue').textContent = value + ' km';
                updateSliderTrack(slider);
            } else if (type === 'gridResolution') {
                const slider = document.getElementById('gridResolutionSlider');
                const value = slider.value;
                document.getElementById('gridResolutionValue').textContent = value + ' m';
                updateSliderTrack(slider);
            }
        }
        
        function updateSliderTrack(slider) {
            const min = parseFloat(slider.min);
            const max = parseFloat(slider.max);
            const value = parseFloat(slider.value);
            const percentage = ((value - min) / (max - min)) * 100;
            slider.style.backgroundSize = percentage + '% 100%';
        }
        
        function initSliders() {
            const domainSlider = document.getElementById('domainSizeSlider');
            const gridSlider = document.getElementById('gridResolutionSlider');
            updateSliderTrack(domainSlider);
            updateSliderTrack(gridSlider);
        }
        
        init();
    </script>
</body>
</html>
